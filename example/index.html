<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>binpack3d — interactive demo</title>
    <link rel="stylesheet" href="./style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://esm.sh/three@0.169.0",
          "three/addons/": "https://esm.sh/three@0.169.0/examples/jsm/",
          "binpack3d": "./dist/index.js"
        }
      }
    </script>
  </head>
  <body>
    <header>
      <div class="brand">
        <strong>binpack3d</strong>
        <span class="subtitle">interactive 3D bin packing demo</span>
      </div>
      <nav>
        <a href="https://github.com/wxul/binpack3d" target="_blank" rel="noopener" aria-label="GitHub repository">
          <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/></svg>
          <span>GitHub</span>
        </a>
        <a href="https://www.npmjs.com/package/binpack3d" target="_blank" rel="noopener" aria-label="npm package">
          <svg width="18" height="14" viewBox="0 0 780 250" aria-hidden="true"><path d="M240,250h100v-50h100V0H240V250z M340,50h50v100h-50V50z M480,0v200h100V50h50v150h50V50h50v150h50V0H480z M0,200h100V50h50v150h50V0H0V200z"/></svg>
          <span>npm</span>
        </a>
      </nav>
    </header>

    <main class="layout">
      <aside class="panel input-panel">
        <div class="row">
          <label for="preset">Preset</label>
          <select id="preset"></select>
          <button id="pack" class="primary">Pack ▶</button>
        </div>

        <details open>
          <summary>Bins (JSON)</summary>
          <textarea id="bins-input" spellcheck="false" rows="6"></textarea>
        </details>

        <details open>
          <summary>Items (JSON)</summary>
          <textarea id="items-input" spellcheck="false" rows="10"></textarea>
        </details>

        <details>
          <summary>Options</summary>
          <div class="options">
            <label><input type="checkbox" id="opt-biggerFirst" checked /> biggerFirst</label>
            <label><input type="checkbox" id="opt-distributeItems" /> distributeItems</label>
            <label>
              numberOfDecimals
              <input type="number" id="opt-decimals" value="2" min="0" max="6" />
            </label>
          </div>
        </details>

        <p id="parse-error" class="error" hidden></p>

        <div class="legend">
          <strong>Legend</strong>
          <div><span class="swatch outline-red"></span> fragile</div>
          <div><span class="swatch outline-dashed"></span> nonStackable</div>
          <div><span class="swatch ring"></span> grouped (same color)</div>
        </div>
      </aside>

      <section class="viewer">
        <canvas id="canvas"></canvas>
        <div class="viewer-toolbar">
          <button id="reset-camera">Reset camera</button>
          <label>
            <input type="checkbox" id="toggle-labels" /> show load order
          </label>
        </div>
      </section>

      <aside class="panel output-panel">
        <div id="bin-summary"></div>
        <div id="unfit-summary"></div>
      </aside>
    </main>

    <footer>
      <span>
        <a href="https://github.com/wxul/binpack3d" target="_blank" rel="noopener">github.com/wxul/binpack3d</a>
        · MIT licensed
      </span>
    </footer>

    <script type="module" src="./app.js"></script>
  </body>
</html>
